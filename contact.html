<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Contact Us
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Roboto', sans-serif;
        }
  </style>
 </head>
 <body class="bg-gray-900 text-white">
  <div class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
   <div class="max-w-md w-full space-y-8">
    <div>
     <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
      Contact Us
     </h2>
     <p class="mt-2 text-center text-sm text-gray-400">
      We'd love to hear from you!
     </p>
    </div>
    <form action="#" class="mt-8 space-y-6" method="POST">
     <input name="remember" type="hidden" value="true"/>
     <div class="rounded-md shadow-sm -space-y-px">
      <div>
       <label class="sr-only" for="name">
        Name
       </label>
       <input autocomplete="name" class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" id="name" name="name" placeholder="Name" required="" type="text"/>
      </div>
      <div>
       <label class="sr-only" for="email">
        Email address
       </label>
       <input autocomplete="email" class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" id="email" name="email" placeholder="Email address" required="" type="email"/>
      </div>
      <div>
       <label class="sr-only" for="message">
        Message
       </label>
       <textarea class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" id="message" name="message" placeholder="Your message" required="" rows="4"></textarea>
      </div>
     </div>
     <div>
      <button class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" type="submit">
       <span class="absolute left-0 inset-y-0 flex items-center pl-3">
        <i class="fas fa-paper-plane">
        </i>
       </span>
       Send Message
      </button>
     </div>
    </form>
   </div>
  </div>
 </body>
</html>
